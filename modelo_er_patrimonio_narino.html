
<div id="erd"></div>
<style>
  :root {
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #4a4a4a;
    --color-text-tertiary: #757575;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e0e0e0;
      --color-text-secondary: #b0b0b0;
      --color-text-tertiary: #808080;
    }
  }
  body {
    background-color: transparent;
    color: var(--color-text-primary);
    font-family: "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
  }
  #erd svg { width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  MUNICIPIO {
    uuid id PK
    varchar codigo_divipola UK
    varchar nombre
    varchar departamento
    int poblacion
    timestamp created_at
  }

  GESTOR_CULTURAL {
    uuid id PK
    varchar nombres
    varchar apellidos
    varchar email UK
    varchar rol
    uuid municipio_id FK
    boolean activo
    timestamp created_at
  }

  MANIFESTACION {
    uuid id PK
    varchar nombre
    varchar categoria
    text descripcion
    varchar ambito_geografico
    varchar comunidad_portadora
    timestamp created_at
  }

  FICHA_PATRIMONIAL {
    uuid id PK
    varchar codigo_ficha UK
    uuid municipio_id FK
    uuid manifestacion_id FK
    uuid gestor_id FK
    varchar estado
    text observaciones
    boolean sincronizada
    timestamp fecha_registro
    timestamp fecha_sincronizacion
    jsonb campos_libres
  }

  EVIDENCIA {
    uuid id PK
    uuid ficha_id FK
    varchar tipo
    varchar url_almacenamiento
    varchar nombre_archivo
    bigint tamano_bytes
    timestamp created_at
  }

  EXPORTACION_LRPCI {
    uuid id PK
    uuid ficha_id FK
    varchar version_lrpci
    varchar estado_envio
    text datos_exportados
    timestamp fecha_envio
    varchar codigo_respuesta_ministerio
  }

  MUNICIPIO ||--o{ GESTOR_CULTURAL : "asigna"
  MUNICIPIO ||--o{ FICHA_PATRIMONIAL : "registra"
  GESTOR_CULTURAL ||--o{ FICHA_PATRIMONIAL : "crea"
  MANIFESTACION ||--o{ FICHA_PATRIMONIAL : "tipifica"
  FICHA_PATRIMONIAL ||--o{ EVIDENCIA : "tiene"
  FICHA_PATRIMONIAL ||--o{ EXPORTACION_LRPCI : "genera"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
